name: CI – Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Pre-deploy structural checks ─────────────────────────────────────
      - name: Pre-deploy checks (nav/routes, imports, API proxy, truncation)
        run: node scripts/pre-deploy-check.js

      # ── Unit tests ───────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── Build check ──────────────────────────────────────────────────────
      - name: Build (Vite)
        run: npm run build

      # ── Upload build artifact (only on main) ─────────────────────────────
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
